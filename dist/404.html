<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>ICUNI Labs</title>
  <script>
    // GitHub Pages SPA redirect: converts /path to /#path
    // e.g. /jobs → /#jobs, /referral → /#referral, /job/ops-assistant-001 → /#job/ops-assistant-001
    var path = window.location.pathname;
    if (path && path !== '/' && path !== '/index.html') {
      var hash = '#' + path.replace(/^\//, '').replace(/\/$/, '');
      window.location.replace('/' + (window.location.search || '') + hash);
    } else {
      window.location.replace('/');
    }
  </script>
</head>
<body></body>
</html>
